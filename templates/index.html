<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ConvoMate</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
ConvoMate 🤖
</div>

<div class="credit">
by Arjun Mondal
</div>

<h3 style="margin-top:20px;">
Recent Chats
</h3>

<div id="history"></div>

</div>

<!-- CHAT -->

<div class="chat">

<div class="chat-box" id="chat"></div>

<div class="input-area">

<input
id="input"
placeholder="Ask anything..."
/>

<input
type="file"
id="file"
/>

<button onclick="send()">
Send
</button>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
