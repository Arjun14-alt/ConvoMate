<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ConvoMate</title>

<style>
body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: radial-gradient(circle at top, #141726, #0b0d12);
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: rgba(10, 12, 18, 0.7);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 22px;
}

.sidebar h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #9b7bff;
    letter-spacing: 0.5px;
}

.credit {
    margin-top: 10px;
    font-size: 12px;
    color: #888;
}

/* Chat container */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Chat box */
.chat-box {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
}

/* Messages */
.msg {
    margin: 10px 0;
    padding: 14px 16px;
    border-radius: 16px;
    max-width: 72%;
    line-height: 1.5;
    font-size: 14px;
    animation: fade 0.25s ease;
}

/* user */
.user {
    background: linear-gradient(135deg, #7c5cff, #9b7bff);
    margin-left: auto;
    text-align: right;
    box-shadow: 0 8px 20px rgba(124, 92, 255, 0.2);
}

/* bot */
.bot {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
}

/* input area */
.input-area {
    display: flex;
    padding: 16px;
    background: rgba(10, 12, 18, 0.7);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.06);
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.06);
    color: white;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c5cff, #9b7bff);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* animation */
@keyframes fade {
    from {opacity: 0; transform: translateY(6px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>ConvoMate 🤖</h2>
    <p style="color:#aaa;font-size:13px;">
        AI chat assistant powered by Groq LLM
    </p>

    <div class="credit">
        built with ❤️ by <b style="color:#c2a8ff;">Arjun Mondal</b>
    </div>
</div>

<div class="chat-container">

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask anything..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();
    addMessage(data.reply, "bot");
}

function addMessage(text, type) {
    let box = document.getElementById("chat-box");
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
