<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ConvoMate</title>

<style>

body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: radial-gradient(circle at top, #141726, #0b0d12);
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: rgba(10, 12, 18, 0.7);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 22px;
    flex-shrink: 0;
}

.sidebar h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #9b7bff;
}

.credit {
    margin-top: 10px;
    font-size: 12px;
    color: #888;
}

/* Chat container */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

/* Chat box */
.chat-box {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
}

/* Messages */
.msg {
    margin: 10px 0;
    padding: 14px 16px;
    border-radius: 16px;
    max-width: 70%;
    line-height: 1.5;
    font-size: 14px;
    word-wrap: break-word;
}

/* user */
.user {
    background: linear-gradient(135deg, #7c5cff, #9b7bff);
    margin-left: auto;
    text-align: right;
}

/* bot */
.bot {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
}

/* input area */
.input-area {
    display: flex;
    padding: 14px;
    background: rgba(10, 12, 18, 0.7);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.06);
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.06);
    color: white;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c5cff, #9b7bff);
    color: white;
    cursor: pointer;
}

/* ========================= */
/* 📱 MOBILE RESPONSIVENESS */
/* ========================= */

@media (max-width: 900px) {

    .sidebar {
        width: 200px;
        padding: 16px;
    }

    .msg {
        max-width: 80%;
    }
}

/* 📱 SMALL MOBILE */
@media (max-width: 700px) {

    body {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding: 12px;
        text-align: center;
    }

    .chat-box {
        padding: 12px;
    }

    .msg {
        max-width: 90%;
        font-size: 13px;
    }

    .input-area {
        padding: 10px;
    }

    input {
        font-size: 13px;
        padding: 12px;
    }

    button {
        padding: 12px 14px;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>ConvoMate 🤖</h2>
    <p style="color:#aaa;font-size:13px;">
        AI assistant powered by Groq
    </p>

    <div class="credit">
        built with ❤️ by <b style="color:#c2a8ff;">Arjun Mondal</b>
    </div>
</div>

<div class="chat-container">

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask anything..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();
    addMessage(data.reply, "bot");
}

function addMessage(text, type) {
    let box = document.getElementById("chat-box");
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
