<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 📱 MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ConvoMate</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1117;
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #0b0d12;
    border-right: 1px solid #1f2430;
    padding: 16px;
    overflow-y: auto;
}

.sidebar h2 {
    color: #9b7bff;
}

.history-item {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
}

/* CHAT */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-box {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
}

.msg {
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    max-width: 75%;
    white-space: pre-wrap;
}

.user {
    background: #7c5cff;
    margin-left: auto;
}

.bot {
    background: #1a1f2b;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 12px;
    border-top: 1px solid #222;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 8px;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #7c5cff;
    color: white;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
    .sidebar {
        display: none;
    }

    .msg {
        max-width: 90%;
        font-size: 13px;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>ConvoMate 🤖</h2>
    <p style="font-size:12px;color:#aaa;">built by Arjun Mondal</p>

    <h4>History</h4>
    <div id="history"></div>
</div>

<!-- CHAT -->
<div class="chat-container">

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask anything..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

function addHistory(text) {
    let box = document.getElementById("history");

    let item = document.createElement("div");
    item.className = "history-item";
    item.innerText = text.slice(0, 40);

    item.onclick = () => {
        document.getElementById("input").value = text;
    };

    box.prepend(item);
}

function addMsg(text, type) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {

    let input = document.getElementById("input");
    let text = input.value;
    if (!text) return;

    addMsg(text, "user");
    addHistory(text);
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();
    addMsg(data.reply, "bot");
}

</script>

</body>
</html>
